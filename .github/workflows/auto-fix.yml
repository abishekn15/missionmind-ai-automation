# Workflow name shown in the GitHub Actions tab.
name: AI Bug Fix Automation

# Run this workflow only when a new GitHub Issue is opened.
on:
  issues:
    types:
      - opened

# The final flow creates a branch and PR in the target repository and comments
# the PR URL back on the original issue. These are the only permissions requested.
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-bug-fix:
    # Use the latest Ubuntu runner provided by GitHub Actions.
    runs-on: ubuntu-latest

    steps:
      # Checkout the automation repository so the runner can access scripts/.
      - name: Checkout automation repository
        uses: actions/checkout@v4

      # Python 3.11 is used by all automation scripts.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Print the raw issue values from the GitHub event payload so operators can
      # confirm exactly what triggered the automation.
      - name: Print raw issue details
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          echo "Issue number: ${ISSUE_NUMBER}"
          echo "Issue title: ${ISSUE_TITLE}"
          echo "Issue author: ${ISSUE_AUTHOR}"
          echo "Issue URL: ${ISSUE_URL}"
          echo "Issue body:"
          printf '%s\n' "${ISSUE_BODY}"

      # Parse the issue title/body into parsed_issue.json. Environment variables
      # preserve multiline bodies without executing issue-provided text.
      - name: Parse issue request
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          DEFAULT_REPO_OWNER: ${{ github.repository_owner }}
          PARSED_ISSUE_JSON_PATH: parsed_issue.json
        run: python scripts/parse_issue.py

      # Clone the public same-owner target repository into target-repo/.
      # This intentionally uses only the built-in GITHUB_TOKEN.
      - name: Clone target repository
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          OWNER="$(python -c 'import json; print(json.load(open("parsed_issue.json"))["repo_owner"])')"
          REPO="$(python -c 'import json; print(json.load(open("parsed_issue.json"))["repo_name"])')"
          rm -rf target-repo
          git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${OWNER}/${REPO}.git" target-repo
          echo "Cloned ${OWNER}/${REPO} into target-repo/"
          find target-repo -maxdepth 1 -type f -print | sort

      # Ask Claude to inspect Python files and overwrite only the affected file.
      # Uses Haiku (cheapest Claude 3 tier). Override with repo variable ANTHROPIC_MODEL if needed.
      - name: Generate AI bug fix with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-3-haiku-20240307
        run: python scripts/claude_fix.py

      # Create ai-fix-<issue-number>, commit the modified file, and push the branch.
      - name: Commit and push AI fix branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/git_commit_push.py

      # Create a pull request in the target repository using GitHub CLI.
      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/create_pr.py

      # Comment the created PR URL back on the original issue in this automation repo.
      - name: Comment PR URL on original issue
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          AUTOMATION_REPO: ${{ github.repository }}
        run: python scripts/comment_pr.py
